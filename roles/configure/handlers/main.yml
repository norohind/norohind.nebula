---
# handlers file for nebula
- name: Reload nebula config (systemd)
  when: ansible_distribution != "Void"
  listen: nebula_reload
  service:
    name: "{{ nebula_service_name }}"
    state: "{{ reload_state }}"

- name: Reload nebula config (runit)
  when: ansible_distribution == "Void"
  listen: nebula_reload
  community.general.runit:
    name: "{{ nebula_service_name }}"
    state: "{{ reload_state }}"
